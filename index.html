<script>
// 日期
const now = new Date();
const m = now.getMonth() + 1;
const d = now.getDate();
document.getElementById('date').innerText = `${m}月${d}日,${m}月${d+1}日`;

// ===== 离线QR生成（canvas → 转img，兼容Edge）=====
function generateQRImage(text) {
  const size = 240;
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // 简单QR-like图案（稳定离线，不依赖任何库）
  ctx.fillStyle = '#fff';
  ctx.fillRect(0,0,size,size);
  ctx.fillStyle = '#000';

  const cells = 33;
  const cellSize = size / cells;

  // 生成伪随机分布（保证每次变化）
  let seed = 0;
  for (let i=0;i<text.length;i++) seed += text.charCodeAt(i);

  function rand() {
    seed = (seed * 9301 + 49297) % 233280;
    return seed / 233280;
  }

  for (let y=0;y<cells;y++) {
    for (let x=0;x<cells;x++) {
      // 三个定位点（像二维码）
      if ((x<7 && y<7) || (x>cells-8 && y<7) || (x<7 && y>cells-8)) {
        if (x%6==0||y%6==0|| (x>1&&x<5&&y>1&&y<5)) {
          ctx.fillRect(x*cellSize,y*cellSize,cellSize,cellSize);
        }
      } else {
        if (rand() > 0.75) {
          ctx.fillRect(x*cellSize,y*cellSize,cellSize,cellSize);
        }
      }
    }
  }

  return canvas.toDataURL('image/png');
}

function generateQR() {
  const data = 'USTC-DEMO-' + Date.now() + '-' + Math.random().toString(36).repeat(5);
  const img = document.getElementById('qrImg');
  img.src = generateQRImage(data);
}

generateQR();

// 倒计时
let t = 20;
setInterval(() => {
  t--;
  if (t <= 0) {
    t = 20;
    generateQR();
  }
  document.getElementById('countdown').innerText = t;
}, 1000);
</script>
